name: Monthly Dependency Refresh

'on':
  schedule:
    - cron: '19 6 16 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deps-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'

      - name: Refresh dependencies
        run: |
          npm update
          npm install

      - name: Validate
        run: npm test
        env:
          CI: 'true'

      - name: Open PR with refreshed lockfile
        # v7.0.11 (peter-evans/create-pull-request)
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.PUSH_PAT || github.token }}
          branch: deps/monthly-refresh
          delete-branch: true
          commit-message: 'deps: monthly dependency refresh'
          title: 'deps: monthly dependency refresh'
          body: |
            Automated monthly `npm update`. Validation (`npm test`) passed on this branch.
            Review and merge if green.
          labels: dependencies
