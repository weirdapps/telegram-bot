name: Monthly Dependency Refresh
'on':
  schedule:
    - cron: '19 6 16 * *'
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  refresh:
    uses: weirdapps/shared-workflows/.github/workflows/deps-refresh.yml@main
    with:
      node_version: '22'
      gate_cmd: CI=true npm test
    secrets: inherit
