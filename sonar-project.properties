# SonarCloud configuration for TypeScript/JavaScript projects
# Replace weirdapps, weirdapps_telegram-bot, and telegram-bot with your values

sonar.organization=weirdapps
sonar.projectKey=weirdapps_telegram-bot
sonar.projectName=telegram-bot

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/.venv/**,\
  **/test_scripts/**,\
  **/*.test.ts,\
  **/*.test.js,\
  **/*.spec.ts,\
  **/*.spec.js

# Test exclusions
sonar.test.exclusions=\
  **/test_scripts/**,\
  **/*.test.ts,\
  **/*.test.js,\
  **/*.spec.ts,\
  **/*.spec.js
